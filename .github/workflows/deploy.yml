name: Publicación Automática de Página Web

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, astro]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect and Build
        id: build_step
        shell: bash
        run: |

          if [ ! -f "package.json" ] && [ ! -f "index.html" ]; then
            echo "REPOSITORIO VACÍO: No hay archivos web. Saltando publicación."
            echo "HAS_FILES=false" >> $GITHUB_ENV
          else
            echo "HAS_FILES=true" >> $GITHUB_ENV
            if [ -f "package.json" ]; then
              echo "--- MODO ASTRO ---"
              npm ci && npm run build
              echo "WEB_SOURCE=dist/" >> $GITHUB_ENV
            else
              echo "--- MODO ESTÁTICO ---"
              echo "WEB_SOURCE=./" >> $GITHUB_ENV
            fi
          fi
      
      - name: Setup SSH
        if: env.HAS_FILES == 'true'
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: 1. Deploy to Web (Publicación)
        if: env.HAS_FILES == 'true'
        shell: bash
        run: |
          USER=$(echo "${{ secrets.DEPLOY_USER }}" | xargs)
          HOST=$(echo "${{ secrets.DEPLOY_HOST }}" | xargs)
          
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            --exclude '.git*' \
            --exclude '.github*' \
            --exclude 'node_modules/' \
            ${{ env.WEB_SOURCE }} ${USER}@${HOST}:/var/www/astro-site/

      - name: 2. Sync Source Code to Home (Almacén)
        if: env.HAS_FILES == 'true'
        shell: bash
        run: |
          USER=$(echo "${{ secrets.DEPLOY_USER }}" | xargs)
          HOST=$(echo "${{ secrets.DEPLOY_HOST }}" | xargs)
          
          ssh -i ~/.ssh/id_ed25519 ${USER}@${HOST} "mkdir -p ~/Sitio"
          
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            --exclude '.git/' \
            ./ ${USER}@${HOST}:~/Sitio/

      - name: Fix Permissions
        if: env.HAS_FILES == 'true'
        shell: bash
        run: |
          USER=$(echo "${{ secrets.DEPLOY_USER }}" | xargs)
          HOST=$(echo "${{ secrets.DEPLOY_HOST }}" | xargs)
          ssh -i ~/.ssh/id_ed25519 ${USER}@${HOST} "chmod -R 755 /var/www/astro-site ~/Sitio"
