name: Universal Deploy & Source Backup

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, astro]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect and Build
        id: build_step
        shell: bash
        run: |
          if [ -f "package.json" ]; then
            echo "--- MODO ASTRO ---"
            npm ci && npm run build
            echo "WEB_SOURCE=dist/" >> $GITHUB_ENV
          else
            echo "--- MODO ESTÁTICO ---"
            echo "WEB_SOURCE=./" >> $GITHUB_ENV
          fi

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: 1. Deploy to Web (Publicación)
        shell: bash
        run: |
          # Sincroniza solo los archivos para la web
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            --exclude '.git*' \
            --exclude '.github*' \
            --exclude 'node_modules/' \
            ${{ env.WEB_SOURCE }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/astro-site/

      - name: 2. Sync Source Code to /opt/Sitio (Almacén)
        shell: bash
        run: |
          # Sincroniza TODO el repositorio (excepto .git para ahorrar espacio)
          # Primero creamos la carpeta si no existe
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "sudo mkdir -p /opt/Sitio && sudo chown -R ${{ secrets.DEPLOY_USER }}:${{ secrets.DEPLOY_USER }} /opt/Sitio"
          
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            --exclude '.git/' \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/Sitio/

      - name: Fix Permissions
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "chmod -R 755 /var/www/astro-site /opt/Sitio"
