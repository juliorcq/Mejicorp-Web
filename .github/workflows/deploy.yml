name: Deploy Astro (mscrya)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: [self-hosted, astro]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'EOF'
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy dist to server
        shell: bash
        run: |
            HOST="${{ secrets.DEPLOY_HOST }}"
            USER="${{ secrets.DEPLOY_USER }}"
            PATH_="${{ secrets.DEPLOY_PATH }}"
            echo "Deploying to: $USER@$HOST:$PATH_"
            rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" dist/ "$USER@$HOST:$PATH_/"
