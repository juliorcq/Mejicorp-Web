name: Universal Deploy & Source Backup

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, astro]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect and Build
        id: build_step
        shell: bash
        run: |
          if [ -f "package.json" ]; then
            echo "--- MODO ASTRO ---"
            npm ci && npm run build
            echo "WEB_SOURCE=dist/" >> $GITHUB_ENV
          else
            echo "--- MODO ESTÁTICO ---"
            echo "WEB_SOURCE=./" >> $GITHUB_ENV
          fi

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: 1. Deploy to Web (Publicación)
        shell: bash
        run: |
          USER=$(echo "${{ secrets.DEPLOY_USER }}" | xargs)
          HOST=$(echo "${{ secrets.DEPLOY_HOST }}" | xargs)
          
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            --exclude '.git*' \
            --exclude '.github*' \
            --exclude 'node_modules/' \
            ${{ env.WEB_SOURCE }} ${USER}@${HOST}:/var/www/astro-site/

      - name: 2. Sync Source Code to Home (Almacén)
        shell: bash
        run: |
          USER=$(echo "${{ secrets.DEPLOY_USER }}" | xargs)
          HOST=$(echo "${{ secrets.DEPLOY_HOST }}" | xargs)
          
          # Usamos una ruta donde NO necesitamos sudo: /home/usuario/Sitio
          ssh -i ~/.ssh/id_ed25519 ${USER}@${HOST} "mkdir -p ~/Sitio"
          
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            --exclude '.git/' \
            ./ ${USER}@${HOST}:~/Sitio/

      - name: Fix Permissions
        shell: bash
        run: |
          USER=$(echo "${{ secrets.DEPLOY_USER }}" | xargs)
          HOST=$(echo "${{ secrets.DEPLOY_HOST }}" | xargs)
          # Ajustamos permisos solo en las rutas de mscrya
          ssh -i ~/.ssh/id_ed25519 ${USER}@${HOST} "chmod -R 755 /var/www/astro-site ~/Sitio"
